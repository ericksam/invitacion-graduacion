<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=3.0">
  <title>Samuel Barrios - Maestría en Seguridad Informática</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Italiana&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --bg: #FAF7F2;
      --text: #1A2F23;
      --gold: #B8956E;
      --gold-light: #D4BC8A;
    }
    
    html, body {
      height: 100%;
      overflow-x: hidden;
    }
    
    body {
      font-family: 'Cormorant Garamond', serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem 3rem;
      padding-top: calc(2rem + env(safe-area-inset-top));
    }
    
    .card {
      max-width: 480px;
      width: 100%;
      padding: 4rem 2rem;
      text-align: center;
      position: relative;
    }
    
    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 60px;
      height: 1px;
      background: var(--gold);
    }
    
    .eyebrow {
      font-family: 'Italiana', serif;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.5em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 2.5rem;
      opacity: 0;
      transform: translateY(20px);
      padding: 0.6rem 1.4rem;
      border: 1px solid var(--gold);
      display: inline-block;
    }
    
.degree {
      font-family: 'Italiana', serif;
      font-size: 1rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      margin-bottom: 1rem;
      opacity: 0;
      transform: translateY(20px);
    }
    
    .subtitle {
      font-size: 1.4rem;
      font-style: italic;
      color: #4A5A4E;
      margin-bottom: 2rem;
      line-height: 1.7;
      opacity: 0;
      transform: translateY(20px);
    }
    
    .name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 3.5rem;
      font-weight: 300;
      letter-spacing: 0.12em;
      margin-bottom: 1.5rem;
      opacity: 0;
      transform: translateY(20px);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
    }
    
    .name-icon {
      width: 42px;
      height: 42px;
      fill: var(--gold);
      opacity: 0.8;
    }
    
    .info {
      margin-top: 1.5rem;
      opacity: 0;
      transform: translateY(20px);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }
    
    .info-icon {
      width: 18px;
      height: 18px;
      fill: var(--gold);
      opacity: 0.7;
    }
    
    .subtitle {
      font-size: 1rem;
      font-style: italic;
      color: #4A5A4E;
      margin-bottom: 2rem;
      line-height: 1.7;
      opacity: 0;
      transform: translateY(20px);
    }
    
    .line {
      width: 80px;
      height: 1px;
      background: var(--gold);
      margin: 2rem auto;
      opacity: 0;
      transform: scaleX(0);
    }
    
    .info {
      margin-top: 1.8rem;
      opacity: 0;
      transform: translateY(20px);
      display: flex;
      align-items: flex-start;
      justify-content: center;
      gap: 0.8rem;
    }
    
    .info > div {
      text-align: left;
    }
    
    .info-icon {
      width: 24px;
      height: 24px;
      fill: var(--gold);
      opacity: 0.7;
      flex-shrink: 0;
      margin-top: 0.2rem;
    }
    
    .info-label {
      font-family: 'Italiana', serif;
      font-size: 0.7rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 0.3rem;
    }
    
    .info-value {
      font-size: 1.3rem;
      font-weight: 400;
    }
    
.location {
      font-family: 'Italiana', serif;
      font-size: 1.5rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-top: 2.5rem;
      opacity: 0;
      transform: translateY(20px);
      text-decoration: none;
      color: inherit;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      transition: color 0.3s ease;
    }
    
    .location-icon {
      width: 22px;
      height: 22px;
      fill: currentColor;
      opacity: 0.7;
      transition: opacity 0.3s ease, transform 0.3s ease;
    }
    
    .location:hover {
      color: var(--gold);
    }
    
    .location:focus {
      outline: none;
    }
    
    .location:focus-visible {
      outline: 2px solid var(--gold);
      outline-offset: 4px;
    }
    
    .location-icon {
      width: 18px;
      height: 18px;
      fill: currentColor;
      opacity: 0.7;
      transition: opacity 0.3s ease, transform 0.3s ease;
    }
    
    .location:hover .location-icon {
      opacity: 1;
      transform: scale(1.15);
    }
    
    .location-sub {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.9rem;
      font-style: italic;
      color: #4A5A4E;
      margin-top: 0.5rem;
      opacity: 0;
      transform: translateY(20px);
    }
    
    .quota {
      font-family: 'Italiana', serif;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
      margin-top: 2rem;
      padding: 0.6rem 1.2rem;
      border: 1px solid var(--gold);
      opacity: 0;
      transform: translateY(20px);
      display: inline-block;
      animation: fadeInUp 0.8s ease-out forwards 1.5s, pulse 2s ease-in-out 2.3s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(184, 149, 110, 0.4); }
      50% { box-shadow: 0 0 0 8px rgba(184, 149, 110, 0); }
    }
    
    .flourish {
      margin-top: 2.5rem;
      opacity: 0;
      transform: translateY(20px);
    }
    
    .flourish svg {
      width: 24px;
      height: 24px;
    }
    
    .flourish svg path {
      fill: var(--gold);
      opacity: 0.6;
    }
    
    /* Animations */
    @keyframes fadeInUp {
      to { opacity: 1; transform: translateY(0); }
    }
    
    @keyframes scaleIn {
      to { opacity: 1; transform: scaleX(1); }
    }
    
    .animate { animation: fadeInUp 0.8s ease-out forwards; }
    .animate-delay-1 { animation-delay: 0.15s; }
    .animate-delay-2 { animation-delay: 0.3s; }
    .animate-delay-3 { animation-delay: 0.45s; }
    .animate-delay-4 { animation-delay: 0.6s; }
    .animate-delay-5 { animation-delay: 0.75s; }
    .animate-delay-6 { animation-delay: 0.9s; }
    .animate-delay-7 { animation-delay: 1.05s; }
    .animate-delay-8 { animation-delay: 1.2s; }
    .animate-delay-9 { animation-delay: 1.35s; }
    
    .line-animate { animation: scaleIn 0.8s ease-out forwards; animation-delay: 0.7s; }
    
    /* Hover */
    .hover:hover {
      color: var(--gold);
    }
    
    /* Responsive */
    @media (max-width: 500px) {
      html, body {
        height: 100%;
        min-height: -webkit-fill-available;
      }
      
      body {
        padding: 3rem 1.2rem 4rem;
        align-items: flex-start;
        padding-top: max(2rem, env(safe-area-inset-top));
      }
      
      .card { 
        padding: 2rem 1rem; 
        margin-top: 1rem;
      }
      .name { font-size: 2.2rem; }
      .name-icon { width: 32px; height: 32px; }
      .eyebrow { font-size: 0.75rem; padding: 0.5rem 1rem; }
      .degree { font-size: 0.8rem; }
      .subtitle { font-size: 1.1rem; }
      .info-icon { width: 18px; height: 18px; }
      .info-value { font-size: 1.1rem; }
      .location { font-size: 1.1rem; }
      .location-icon { width: 16px; height: 16px; }
      .location-sub { font-size: 0.8rem; }
      .quota { font-size: 0.85rem; padding: 0.5rem 1rem; }
    }
  </style>
</head>
<body>
  <div class="card">
    <p class="eyebrow animate animate-delay-1">Estás cordialmente invitado</p>
    
    <p class="degree animate animate-delay-2">Recepción de Graduación</p>
    
    <h1 class="name hover animate animate-delay-3">
      <svg class="name-icon" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M12 3L1 9l11 6 9-4.91V17h2V9M5 13.18v4L12 21l7-3.82v-4L12 17l-7-3.82zM12 3L1 9l11 6 9-4.91V17h2V9"/>
      </svg>
      MA. Samuel Barrios
    </h1>
    
    <p class="subtitle animate animate-delay-4">Maestría en<br>Seguridad Informática</p>
    
    <div class="line line-animate"></div>
    
    <div class="info animate animate-delay-5">
      <svg class="info-icon" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M19 19H5V8h14m0-5v-2H4v2c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2h-1V1h-2v2H8V1H6v2H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h15c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2z"/>
      </svg>
      <div>
        <p class="info-label">Fecha</p>
        <p class="info-value">Domingo 24 de Mayo de 2026</p>
      </div>
    </div>
    
    <div class="info animate animate-delay-6">
      <svg class="info-icon" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm.5-13H11v6l5.2 3.2.8-1.3-4.5-2.7V7z"/>
      </svg>
      <div>
        <p class="info-label">Hora</p>
        <p class="info-value">14:00 horas</p>
      </div>
    </div>
    
    <a href="https://www.waze.com/es-419/live-map/directions?to=ll.14.496653%2C-90.481961" target="_blank" class="location hover animate animate-delay-7" aria-label="Ver ubicación en Waze">
      <svg class="location-icon" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
      </svg>
      Restaurante Tango
    </a>
    <p class="location-sub animate animate-delay-8">Decocity - km 22.5 Carretera al Salvador</p>
    
    <p class="quota animate animate-delay-9">Cupo para 1 persona</p>
    
    <div class="flourish animate animate-delay-10">
      <svg viewBox="0 0 24 24">
        <path d="M12 2L12 22M2 12L22 12M5.5 5.5L18.5 18.5M18.5 5.5L5.5 18.5"/>
      </svg>
    </div>
  </div>
</body>
</html>
